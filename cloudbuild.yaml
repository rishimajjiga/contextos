steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/contextos-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/contextos-backend:latest'
      - './backend'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/contextos-backend'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'contextos-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/contextos-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'APP_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/contextos-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/contextos-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
