<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="ContextOS — The memory layer for AI. Define your context once, use it everywhere." />
    <meta name="theme-color" content="#eef3e7" />

    <!-- Warm critical third-party connections (API backend + Clerk auth) -->
    <link rel="preconnect" href="https://api.usecontextos.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.usecontextos.com" />
    <link rel="preconnect" href="https://creative-leopard-73.clerk.accounts.dev" crossorigin />
    <link rel="dns-prefetch" href="https://creative-leopard-73.clerk.accounts.dev" />

    <!-- Inter (body) + Fraunces (display serif) + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>ContextOS</title>

    <!-- Google AdSense — site verification + ads.
         Replace ca-pub-XXXXXXXXXXXXXXXX (both places) with your AdSense publisher ID, then deploy.
         This <script> tag is exactly what AdSense's "AdSense code snippet" verification checks for. -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-XXXXXXXXXXXXXXXX" />
  </head>
  <body class="bg-surface-0 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
